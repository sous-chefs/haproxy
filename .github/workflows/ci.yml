---
name: Dokken Integration Tests

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.1
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        os:
          - "fedora-latest"
          - "almalinux-9"
          - "almalinux-10"
          - "centos-stream-9"
          - "centos-stream-10"
          - "debian-12"
          - "debian-13"
          - "opensuse-leap-15"
          - "ubuntu-2204"
          - "ubuntu-2404"
        suite:
          - "default"
          - "package"
          - "source-28"
          - "source-default"
          - "source-openssl"
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Chef
        uses: actionshub/chef-install@main
      - name: Dokken
        uses: actionshub/test-kitchen@main
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}

  integration-amazonlinux:
    needs: lint-unit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        os:
          - "amazonlinux-2023"
        suite:
          - "default"
          - "package"
          - "source-28"
          - "source-default"
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Chef
        uses: actionshub/chef-install@main
      - name: Dokken
        uses: actionshub/test-kitchen@main
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}

  lua-test:
    needs: lint-unit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        os:
          - "centos-stream-10"
        suite:
          - "source-lua"
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Chef
        uses: actionshub/chef-install@main
      - name: Dokken
        uses: actionshub/test-kitchen@main
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}

  config-test:
    needs: lint-unit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        os:
          - "centos-stream-10"
        suite:
          - "config-2"
          - "config-acl"
          - "config-array"
          - "config-backend-search"
          - "config-custom-template"
          - "config-fastcgi"
          - "config-resolver"
          - "config-ssl-redirect"
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Chef
        uses: actionshub/chef-install@main
      - name: Dokken
        uses: actionshub/test-kitchen@main
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
